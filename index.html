<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holographic Foil — Interactive Demo</title>
  <script type="module" crossorigin src="./assets/index-DToHBahs.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Bt5fmLvy.css">
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <!-- Theme toggle -->
    <button id="theme-toggle" title="Toggle theme">&#9788;</button>

    <!-- Gyroscope permission (iOS) -->
    <button id="gyro-btn" style="display:none">Enable Gyroscope</button>

    <!-- Upload -->
    <button id="upload-btn">Upload Card Image</button>
    <input type="file" id="file-input" accept="image/*" hidden>

    <!-- Controls panel -->
    <div id="controls">
      <button id="controls-toggle">&#9650; Controls</button>
      <div id="controls-inner">

        <label>
          Quality
          <select id="quality">
            <option value="fast">Fast</option>
            <option value="balanced" selected>Balanced</option>
            <option value="physical">Physical</option>
          </select>
        </label>

        <label>
          Foil Pattern
          <select id="foil-pattern">
            <option value="full" selected>Full Holo</option>
            <option value="cosmos">Cosmos</option>
            <option value="linear">Linear</option>
            <option value="star">Star Sparkle</option>
            <option value="reverse">Reverse Holo</option>
            <option value="diamond">Diamond</option>
            <option value="chevron">Chevron</option>
            <option value="hexagon">Honeycomb</option>
            <option value="swirl">Swirl</option>
            <option value="crosshatch">Crosshatch</option>
            <option value="scales">Dragon Scales</option>
            <option value="circuit">Circuit Board</option>
            <option value="ripple">Ripple</option>
            <option value="cracked-ice">Cracked Ice</option>
            <option value="confetti">Confetti</option>
          </select>
        </label>

        <label>
          Preset
          <select id="preset">
            <option value="">Custom</option>
            <option value="trading-card" selected>Trading Card</option>
            <option value="cd-rom">CD-ROM</option>
            <option value="credit-card">Credit Card</option>
          </select>
        </label>

        <label>
          Grating Period
          <input type="range" id="grating" min="1000" max="3000" value="1800" step="10">
          <span id="grating-val">1800nm</span>
        </label>

        <label>
          Foil Roughness
          <input type="range" id="roughness" min="0" max="100" value="15" step="1">
          <span id="roughness-val">0.15</span>
        </label>

        <label>
          Foil Intensity
          <input type="range" id="intensity" min="0" max="300" value="150" step="5">
          <span id="intensity-val">1.50</span>
        </label>

        <label>
          Animation Speed
          <input type="range" id="anim-speed" min="0" max="200" value="100" step="5">
          <span id="anim-speed-val">1.00</span>
        </label>

      </div>
    </div>
  </div>

</body>
</html>
